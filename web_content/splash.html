<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      color: white;
      font-family: sans-serif;
    }

    #fader{
        width: 100%;
        height: 100%;
        background-color: rgb(0, 0, 0);
        position: absolute;
        z-index: 999;
        animation: fadeout 8.5s linear;
    }
    /* Exemplo de Spinner */
    .loader {
      border: 8px solid #333;
      border-top: 8px solid #ff0000;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeout{
        0%{
            opacity: 0;
        }

        90%{
            opacity: 0;
        }

        100%{
            opacity: 1;
        }
    }
  </style>
</head>
<body>
    <div id="fader"></div>
  <div>
    <div class="loader"></div>
    <p>Nexus...</p>
  </div>
</body>
</html>
